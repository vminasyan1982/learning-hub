name: Deploy to Production

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Deploy to 185.157.245.247
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 185.157.245.247
          username: root
          key: ${{ secrets.TATEV }}
          port: 22
          script: |
            set -e
            cd /opt/learning-hub

            echo "==> Syncing code from GitHub..."
            git fetch origin main
            git reset --hard origin/main

            echo "==> Stopping and removing old containers..."
            docker compose down --remove-orphans

            echo "==> Building and starting fresh containers..."
            docker compose up --build -d

            echo "==> Collecting static files..."
            docker compose exec -T backend python manage.py collectstatic --noinput --clear

            echo "==> Cleaning up unused images..."
            docker image prune -f

            echo ""
            echo "Deploy complete!"
            echo "NOTE: Migrations are NOT applied automatically."
            echo "Run manually if needed:"
            echo "  docker compose exec backend python manage.py migrate"
