name: Deploy to Production

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Deploy to 185.157.245.247
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 185.157.245.247
          username: root
          key: ${{ secrets.TATEV }}
          port: 22
          script: |
            set -e
            cd /opt/learning-hub

            echo "==> [1/7] Syncing code from GitHub..."
            git fetch origin main
            git reset --hard origin/main

            echo "==> [2/7] Stopping old containers..."
            docker compose down --remove-orphans

            echo "==> [3/7] Building and starting containers..."
            docker compose up --build -d

            echo "==> [4/7] Waiting for backend..."
            sleep 12

            echo "==> [5/7] Creating missing migrations (if any)..."
            docker compose exec -T backend python manage.py makemigrations --noinput
            for app in accounts trainings registry trainers trainees portfolio skills idp; do
              docker compose cp backend:/app/backend/apps/$app/migrations/. ./backend/apps/$app/migrations/ 2>/dev/null || true
            done

            echo "==> [6/7] Applying migrations..."
            docker compose exec -T backend python manage.py migrate --noinput

            echo "==> [7/7] Cleaning up old images..."
            docker image prune -f

            echo ""
            echo "✓ Deploy complete! https://185.157.245.247"
